<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 7 7" shape-rendering="crispEdges">
  <!-- black outline (stepped ball) -->
  <g fill="#0c0c0c">
    <rect x="2" y="0" width="3" height="1"/>
    <rect x="1" y="1" width="5" height="1"/>
    <rect x="0" y="2" width="7" height="1"/>
    <rect x="0" y="3" width="7" height="1"/>
    <rect x="0" y="4" width="7" height="1"/>
    <rect x="1" y="5" width="5" height="1"/>
    <rect x="2" y="6" width="3" height="1"/>
  </g>
  <!-- white ball body -->
  <g fill="#ffffff">
    <rect x="2" y="1" width="3" height="1"/>
    <rect x="1" y="2" width="5" height="1"/>
    <rect x="1" y="3" width="5" height="1"/>
    <rect x="1" y="4" width="5" height="1"/>
    <rect x="2" y="5" width="3" height="1"/>
  </g>
  <!-- highlight -->
  <rect x="2" y="2" width="1" height="1" fill="#ffffff"/>
</svg>
