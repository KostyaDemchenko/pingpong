services:
  relay:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8765

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      - DOMAIN=${DOMAIN}
      - CF_API_TOKEN=${CF_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - relay

  # host networking: TURN relays media over a wide UDP port range — mapping
  # 49152-65535 through docker's NAT is slow and memory-hungry, host mode isn't.
  coturn:
    image: coturn/coturn:4
    restart: unless-stopped
    network_mode: host
    command: >-
      --listening-port=3478
      --fingerprint
      --lt-cred-mech
      --user=${TURN_USER}:${TURN_PASS}
      --realm=${TURN_DOMAIN}
      --min-port=49152
      --max-port=65535
      --no-cli
      --no-tlsv1
      --log-file=stdout

volumes:
  caddy_data:
  caddy_config:
